services:
  careerpulse:
    build: .
    ports:
      - "8085:8085"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/health"]
      interval: 60s
      timeout: 5s
      retries: 3
    restart: unless-stopped
